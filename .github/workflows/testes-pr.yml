name: Docker Build, Security, and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Scan - API Pública + Fuzzing Ativo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Preparar diretório de output
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

      - name: Criar script de fuzzing com verificação
        run: |
          cat << 'EOF' > zap-output/fuzz-script.js
          var msg = msg.cloneAll();
          msg.setRequestHeader('Content-Type: 'application/json');
          
          // Payloads de teste com marcador verificável
          var payloads = [
            'FUZZING_VERIFICATION_💥', // Marcador especial
            'normalUser',
            '<script>alert(1)</script>',
            'Robert\'); DROP TABLE Users;--',
            '" OR "" = ""',
            '💥🤖🌪️',
            '"admin"',
            'null'
          ];
          
          // Log de debug
          var FileWriter = Java.type('java.io.FileWriter');
          var fw = new FileWriter('/zap/wrk/fuzz-debug.log', true);
          
          payloads.forEach(function(payload) {
            var newMsg = msg.cloneAll();
            newMsg.setRequestBody('{"username": "' + payload + '"}');
            newMsg.getRequestHeader().setMethod('POST');
            sendAndReceive(newMsg);
            fw.write('Payload injetado: ' + payload + '\n');
          });
          
          fw.close();
          EOF

      - name: Criar configuração ZAP definitiva
        run: |
          cat << 'EOF' > zap-output/zap-config.yaml
          env:
            contexts:
              - name: FuzzContext
                urls:
                  - http://50.85.110.248
                includePaths:
                  - http://50.85.110.248/api/.*
          jobs:
            - type: script
              name: Inject Fuzzer
              parameters:
                action: add
                type: "httpsender"
                engine: "graal.js"
                file: /zap/wrk/fuzz-script.js
            - type: spider
              parameters:
                context: FuzzContext
                maxDuration: 5
            - type: activeScan
              parameters:
                context: FuzzContext
                scanPolicyName: "Default Policy"
                threadCount: 2
            - type: report
              parameters:
                reportDir: /zap/wrk/
                reportFile: zap-results.json
                template: traditional-json-plus
          EOF

      - name: Executar ZAP com verificação
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:2.14.0 \
            zap.sh -cmd -autorun /zap/wrk/zap-config.yaml

      - name: Verificar resultados
        run: |
          echo "=== DEBUG LOG ==="
          cat zap-output/fuzz-debug.log
          
          echo "=== VERIFICAÇÃO ==="
          if grep -q "FUZZING_VERIFICATION_💥" zap-output/zap-results.json; then
            echo "✅ FUZZING COMPROVADO - Payload especial encontrado no relatório"
            echo "📊 Payloads testados: $(grep -c "Payload injetado" zap-output/fuzz-debug.log)"
          else
            echo "❌ FALHA: Fuzzing não registrado"
            echo "Analisando possíveis causas..."
            grep "ERROR\|WARN" zap-output/zap.log || echo "Sem erros no log"
            exit 1
          fi

          echo "=== RESUMO DE VULNERABILIDADES ==="
          jq '[.site[].alerts[]? | {risk: .riskdesc, name: .alert, count: .instances | length}] | group_by(.risk)[] | {risk: .[0].risk, vulnerabilities: map({name: .name, count: .count})}' zap-output/zap-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            zap-output/zap-results.json
            zap-output/fuzz-debug.log
            zap-output/zap.log
        if: always()