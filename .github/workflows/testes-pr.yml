name: Docker Build, Security, and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare output directory with permissions
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

      - name: Run OWASP ZAP Baseline Scan com spider e active scan
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy \
            zap-baseline.py \
              -t http://50.85.110.248/ \
              -r zap-report.html \
              -J zap-output.json \
              -d \
              -S \
              -a \
              -z "-failLevel HIGH"

      - name: Create checker script
        run: |
          cat << 'EOF' > check_zap_alerts.py
          import json
          import sys

          with open('zap-output/zap-output.json') as f:
              data = json.load(f)

          alerts = data.get('site', [])[0].get('alerts', [])

          high_alerts = [a for a in alerts if 'High' in a.get('riskdesc', '')]

          if high_alerts:
              print("⚠️ Vulnerabilidades de risco ALTO encontradas:")
              for alert in high_alerts:
                  print(f"- {alert['alert']} (Risco: {alert['riskdesc']})")
              sys.exit(1)
          else:
              print("✅ Nenhuma vulnerabilidade de risco ALTO encontrada.")
          EOF

      - name: Run ZAP alert check
        run: python3 check_zap_alerts.py