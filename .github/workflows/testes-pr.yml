name: Docker Build, Security, and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare output directory with permissions
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy \
            zap-baseline.py \
            -t http://50.85.110.248/ \
            -r zap-report.html \
            -J zap-output.json \
            -d \
            -I

      - name: Create checker script
        run: |
          cat << 'EOF' > check_zap_alerts.py
          import json

          with open('zap-output/zap-output.json') as f:
              data = json.load(f)

          alerts = data.get('site', [])[0].get('alerts', [])

          if alerts:
              print("⚠️ Vulnerabilidades encontradas (mas ignoradas devido ao uso do parâmetro -I):")
              for alert in alerts:
                  print(f"- {alert['alert']} (Risco: {alert['riskdesc']})")
          else:
              print("✅ Nenhuma vulnerabilidade encontrada.")
          EOF

      - name: Run ZAP alert check
        run: python3 check_zap_alerts.py

  locust:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: zap-security-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Start Flask server
        run: |
          source .venv/bin/activate
          python3 -m flask run --port 5000 & 
          sleep 10

      - name: Check Flask is up
        run: |
          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:5000 || {
            echo "❌ O servidor Flask não respondeu.";
            exit 1;
          }

      - name: Run Locust
        run: |
          source .venv/bin/activate
          locust -f tests/locustfile.py --host=http://localhost:5000 --headless -u 10 -r 2 -t15s