name: Docker Build, Security and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Scan - API Pública
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Preparar diretórios e ficheiros ZAP
        run: |
          mkdir -p zap-output/scripts
          chmod 777 zap-output

          # Criar ficheiro zap.yaml
          cat << 'EOF' > zap-output/zap.yaml
          env:
            contexts:
              - name: PublicContext
                urls:
                  - http://50.85.110.248
                includePaths:
                  - http://50.85.110.248/api/.*
            jobs:
              - type: spider
                name: Spider All Public Endpoints
                context: PublicContext

              - type: passiveScan-wait

              - type: script
                name: Add Script POST Criar Consumidor
                action: add
                parameters:
                  file: /zap/scripts/post_criar_consumidor.js
                  engine: nashorn
                  type: httpsender

              - type: script
                name: Run Script POST Criar Consumidor
                action: run
                parameters:
                  name: post_criar_consumidor

              - type: script
                name: Add Script POST Escolher Produtos
                action: add
                parameters:
                  file: /zap/scripts/post_escolher_produtos.js
                  engine: nashorn
                  type: httpsender

              - type: script
                name: Run Script POST Escolher Produtos
                action: run
                parameters:
                  name: post_escolher_produtos

              - type: report
                parameters:
                  reportDir: /zap/wrk/
                  reportTitle: "ZAP Scan Report"
                  template: traditional-html
                  reportFile: zap-report.html
          EOF

          # Criar script post_criar_consumidor.js
          cat << 'EOF' > zap-output/scripts/post_criar_consumidor.js
          function sendingRequest(msg, initiator, helper) {
              var uri = msg.getRequestHeader().getURI().toString();
              if (uri.endsWith("/api/consumidores/") && msg.getRequestHeader().getMethod() == "POST") {
                  var body = '{"nome":"usuarioTeste"}';
                  msg.getRequestBody().setBody(body);
                  msg.getRequestHeader().setContentLength(body.length);
                  msg.getRequestHeader().setHeader("Content-Type", "application/json");
              }
          }

          function responseReceived(msg, initiator, helper) {}
          EOF

          # Criar script post_escolher_produtos.js
          cat << 'EOF' > zap-output/scripts/post_escolher_produtos.js
          function sendingRequest(msg, initiator, helper) {
              var uri = msg.getRequestHeader().getURI().toString();
              if (uri.match(/\/api\/consumidores\/\d+\/produtos\/$/) && msg.getRequestHeader().getMethod() == "POST") {
                  var body = '{"produtoId":123, "quantidade":1}';
                  msg.getRequestBody().setBody(body);
                  msg.getRequestHeader().setContentLength(body.length);
                  msg.getRequestHeader().setHeader("Content-Type", "application/json");
              }
          }

          function responseReceived(msg, initiator, helper) {}
          EOF

      - name: Executar ZAP Automation Framework
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            -v $(pwd)/zap-output/scripts:/zap/scripts:ro \
            ghcr.io/zaproxy/zaproxy \
            zap.sh -cmd -autorun /zap/wrk/zap.yaml

      - name: Analisar relatório gerado
        run: |
          if grep -q "FAIL" zap-output/zap-report.html; then
            echo "❌ Vulnerabilidades encontradas. Verifica o relatório."
          else
            echo "✅ Nenhuma vulnerabilidade grave detetada."
          fi
