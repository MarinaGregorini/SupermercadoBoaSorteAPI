name: Docker Build, Security, and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Scan - API Pública com Testes POST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Preparar diretórios e criar scripts ZAP
        run: |
          mkdir -p zap-output/scripts
          chmod -R 777 zap-output

          # Script JS para POST /api/consumidores/ (criar consumidor)
          cat << 'EOF' > zap-output/scripts/post_criar_consumidor.js
          function sendingRequest(msg, initiator, helper) {
            if (msg.getRequestHeader().getMethod() === "POST" &&
                msg.getRequestHeader().getURI().toString().endsWith("/api/consumidores/")) {
              var body = '{"username":"testuser","email":"testuser@example.com"}';
              msg.setRequestBody(body);
              msg.getRequestHeader().setHeader("Content-Type", "application/json");
              msg.getRequestHeader().setContentLength(body.length);
            }
          }
          EOF

          # Script JS para POST /api/consumidores/1/produtos/
          cat << 'EOF' > zap-output/scripts/post_escolher_produtos.js
          function sendingRequest(msg, initiator, helper) {
            var uri = msg.getRequestHeader().getURI().toString();
            if (msg.getRequestHeader().getMethod() === "POST" &&
                uri.endsWith("/api/consumidores/1/produtos/")) {
              var body = '{"produtos":[1]}';
              msg.setRequestBody(body);
              msg.getRequestHeader().setHeader("Content-Type", "application/json");
              msg.getRequestHeader().setContentLength(body.length);
            }
          }
          EOF

      - name: Criar ficheiro zap.yaml
        run: |
          cat << 'EOF' > zap-output/zap.yaml
          env:
            contexts:
              - name: PublicContext
                urls:
                  - http://50.85.110.248
                includePaths:
                  - http://50.85.110.248/api/.*
          jobs:
            - type: spider
              name: Spider All Public Endpoints
              context: PublicContext

            - type: script
              name: POST Criar Consumidor
              parameters:
                script: scripts/post_criar_consumidor.js
                action: run

            - type: script
              name: POST Escolher Produtos
              parameters:
                script: scripts/post_escolher_produtos.js
                action: run

            - type: activeScan
              name: Active Scan on Public Endpoints
              context: PublicContext

            - type: report
              parameters:
                reportDir: /zap/wrk/
                reportTitle: "ZAP Scan Report"
                template: traditional-html
                reportFile: zap-report.html
          EOF

      - name: Executar ZAP Automation Framework
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy \
            zap.sh -cmd -autorun /zap/wrk/zap.yaml

      - name: Analisar relatório gerado
        run: |
          if grep -q "FAIL" zap-output/zap-report.html; then
            echo "❌ Vulnerabilidades encontradas. Verifica o relatório."
          else
            echo "✅ Nenhuma vulnerabilidade grave detetada."
          fi