name: Docker Build, Security, and Load Test

on:
  push:
    branches:
      - seguranca4

jobs:
  zap-security-test:
    name: OWASP ZAP Scan - API Pública + Fuzzing Ativo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Preparar diretório de output
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

      - name: Criar ficheiro zap.yaml (spider + passive)
        run: |
          cat << 'EOF' > zap-output/zap.yaml
          env:
            contexts:
              - name: PublicContext
                urls:
                  - http://50.85.110.248
                includePaths:
                  - http://50.85.110.248/api/.*
          jobs:
            - type: spider
              name: Spider All Public Endpoints
              context: PublicContext
            - type: passiveScan-wait
            - type: report
              parameters:
                reportDir: /zap/wrk/
                reportTitle: "ZAP Scan Report"
                template: traditional-html
                reportFile: zap-report.html
            - type: report
              parameters:
                reportDir: /zap/wrk/
                template: traditional-json
                reportFile: zap-report.json
          EOF

      - name: Executar ZAP spider + passive scan
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy \
            zap.sh -cmd -autorun /zap/wrk/zap.yaml

      - name: Criar script de fuzzing personalizado
        run: |
          cat << 'EOF' > zap-output/fuzz-script.js
          var msg = msg.cloneAll();
          msg.setRequestHeader('Content-Type: application/json');
          
          // Payloads do seu ficheiro usernames.txt
          var payloads = [
            'normalUser',
            '<script>alert(1)</script>',
            'Robert\'); DROP TABLE Users;--',
            '" OR "" = ""',
            '💥🤖🌪️',
            '"admin"',
            'null'
          ];
          
          payloads.forEach(function(payload) {
            var newMsg = msg.cloneAll();
            newMsg.setRequestBody('{"username": "' + payload + '"}');
            newMsg.getRequestHeader().setMethod('POST');
            sendAndReceive(newMsg);
          });
          EOF

      - name: Criar ficheiro fuzz.yaml corrigido
        run: |
          cat << 'EOF' > zap-output/fuzz.yaml
          env:
            contexts:
              - name: PublicContext
                urls:
                  - http://50.85.110.248
                includePaths:
                  - http://50.85.110.248/api/.*
          jobs:
            - type: script
              name: Custom Fuzzing Attack
              parameters:
                action: add
                type: httpsender
                engine: graal.js
                file: /zap/wrk/fuzz-script.js
            - type: activeScan
              parameters:
                context: PublicContext
                target: http://50.85.110.248/api/login
            - type: passiveScan-wait
            - type: report
              parameters:
                reportDir: /zap/wrk/
                reportFile: zap-fuzz-report.html
                template: traditional-html
            - type: report
              parameters:
                reportDir: /zap/wrk/
                reportFile: zap-fuzz-report.json
                template: traditional-json
          EOF

      - name: Executar ZAP fuzzing ativo corrigido
        run: |
          docker run --rm \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy \
            zap.sh -cmd -autorun /zap/wrk/fuzz.yaml

      - name: Analisar vulnerabilidades nos relatórios JSON
        run: |
          echo "### Vulnerabilidades no spider + passive scan ###"
          VULNS1=$(jq '[.site[].alerts[]] | length' zap-output/zap-report.json)
          if [ "$VULNS1" -gt 0 ]; then
            echo "⚠️ Encontradas $VULNS1 vulnerabilidades:"
            jq '.site[].alerts[] | {alert: .alert, risk: .riskdesc, url: .instances[].uri}' zap-output/zap-report.json
          else
            echo "✅ Nenhuma vulnerabilidade detectada no spider + passive scan."
          fi

          echo "### Vulnerabilidades no fuzzing ativo ###"
          VULNS2=$(jq '[.site[].alerts[]] | length' zap-output/zap-fuzz-report.json)
          if [ "$VULNS2" -gt 0 ]; then
            echo "⚠️ Encontradas $VULNS2 vulnerabilidades:"
            jq '.site[].alerts[] | {alert: .alert, risk: .riskdesc, url: .instances[].uri}' zap-output/zap-fuzz-report.json
          else
            echo "✅ Nenhuma vulnerabilidade detectada no fuzzing ativo."
          fi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-output/